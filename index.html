<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cosmic Counsel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Spectral:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #b39151; --void: #010103; --orb-glow: rgba(179, 145, 81, 0.15); }
        body { background-color: var(--void); color: #e5e7eb; font-family: 'Spectral', serif; overflow-x: hidden; margin: 0; }
        .serif-cap { font-family: 'Cinzel Decorative', cursive; color: var(--gold); text-transform: uppercase; letter-spacing: 0.2em; }
        .mystic-bg { background: radial-gradient(circle at center, #0d0d16 0%, #010103 80%); min-height: 100vh; }
        
        #crystal-ball {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 450px; height: 450px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.05) 0%, transparent 60%), 
                        radial-gradient(circle at center, var(--orb-glow) 0%, transparent 70%);
            box-shadow: 0 0 100px 10px var(--orb-glow); border: 1px solid rgba(179,145,81,0.1); z-index: -1;
        }

        .tarot-card { width: 160px; height: 270px; cursor: pointer; perspective: 1000px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .flipped .card-inner { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 8px; border: 1px solid rgba(179,145,81,0.3); }
        .card-back { background: #08080a; background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 0l20 20-20 20L0 20z' fill='%23b39151' fill-opacity='0.03'/%3E%3C/svg%3E"); }
        .card-front { background: #030305; transform: rotateY(180deg); display: flex; flex-direction: column; align-items: center; justify-content: center; border-color: var(--gold); }
        
        #deck { -webkit-overflow-scrolling: touch; scroll-snap-type: x mandatory; }
        .card-container { scroll-snap-align: center; }
        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.8s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .audio-btn { position: fixed; bottom: 25px; left: 25px; font-size: 10px; color: var(--gold); z-index: 100; border: 1px solid rgba(179, 145, 81, 0.4); padding: 6px 12px; border-radius: 2px; }
        .disclaimer-fixed { position: fixed; bottom: 25px; right: 25px; font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 0.1em; z-index: 100; }
    </style>
</head>
<body class="mystic-bg flex items-center justify-center p-6 text-center">

    <div id="crystal-ball"></div>
    <div class="disclaimer-fixed">Professional Simulation | For Entertainment Only</div>
    <button id="audio-ui" class="audio-btn" onclick="toggleAudio()">Hush: Active</button>

    <div id="app" class="max-w-4xl w-full z-10">
        <div id="s0" class="fade-in">
            <h1 class="serif-cap text-4xl md:text-6xl mb-4">The Cosmic Counsel</h1>
            <p id="daily-counsel" class="text-gray-400 italic mb-10 text-lg max-w-lg mx-auto">Precedent is a map, but the digital frontier requires a compass.</p>
            <button onclick="startSequence()" class="border border-[#b39151] text-[#b39151] px-12 py-4 uppercase text-[10px] tracking-[0.4em] hover:bg-[#b39151] hover:text-black transition-all">Begin Selection</button>
        </div>

        <div id="s1" class="hidden">
            <h2 class="serif-cap text-2xl mb-8">Identify Your Frequency</h2>
            <div class="grid grid-cols-3 md:grid-cols-6 gap-4" id="zodiac-root"></div>
        </div>

        <div id="s2" class="hidden">
            <h2 class="serif-cap text-2xl mb-2">The Draw</h2>
            <p class="text-gray-500 italic text-xs mb-10 uppercase tracking-widest">Select one card to break your legacy seal.</p>
            <div class="flex overflow-x-auto gap-8 pb-12 px-6" id="deck"></div>
        </div>

        <div id="s3" class="hidden">
            <div class="bg-black/60 backdrop-blur-xl border border-white/5 p-10 max-w-2xl mx-auto text-left shadow-2xl">
                <h3 class="text-[9px] uppercase tracking-[0.5em] text-gray-500 mb-2">Verdict Rendering...</h3>
                <h1 id="res-title" class="serif-cap text-3xl mb-6 text-white"></h1>
                <p id="res-desc" class="text-gray-300 leading-relaxed italic mb-8"></p>
                
                <div class="border-l-2 border-[#b39151] pl-6 mb-10 py-2 bg-white/5">
                    <p class="text-[9px] uppercase tracking-widest text-[#b39151] font-bold mb-2">Counsel for the Transition:</p>
                    <p id="res-hear" class="text-gray-400 italic text-sm"></p>
                </div>

                <div class="flex items-center justify-between border-t border-white/10 pt-8">
                    <button onclick="shareReading()" class="bg-[#b39151] text-black text-[10px] font-bold px-8 py-3 uppercase tracking-widest">Share Reading</button>
                    <button onclick="location.reload()" class="text-gray-500 text-[10px] uppercase border-b border-gray-800 pb-1">Reset</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selection = { zodiac: '', arcanaId: '', locked: false };
        let audioCtx, oscillator, gainNode;

        const arcanaData = [
            { id: 'I', name: 'The Magician', role: 'AI Systems Architect', hear: 'The complexity of law has prepared you for the complexity of logic. Build.', desc: 'You translate high-level legal theory into executable digital protocols.' },
            { id: 'II', name: 'The High Priestess', role: 'Data Ethics Strategist', hear: 'Privacy is the modern privilege. Protect it with professional scrutiny.', desc: 'You navigate global data flows, ensuring compliance doesn’t sacrifice human ethics.' },
            { id: 'IV', name: 'The Emperor', role: 'Head of Digital Governance', hear: 'Order is not found; it is enforced. Build the new digital constitution.', desc: 'You establish the GRC protocols that keep massive tech organisations from chaos.' },
            { id: 'VIII', name: 'Justice', role: 'Algorithmic Auditor', hear: 'Bias is a flaw in the logic, not just the soul. Verify the code.', desc: 'You investigate automated systems for fairness, ensuring neutral outcomes.' },
            { id: 'XIII', name: 'Death', role: 'Transformation Lead', hear: 'Do not mourn the billable hour. For the new to live, the old must be dismantled.', desc: 'You lead the charge in removing legacy friction and automating manual legal tasks.' },
            { id: 'XXI', name: 'The World', role: 'Full-Stack Legal Developer', hear: 'Everything is connected. You are no longer just a lawyer; you are the architect.', desc: 'The ultimate synthesis. You build and litigate within a single unified framework.' }
        ];

        const signs = [{n:'Aries',e:'♈'},{n:'Taurus',e:'♉'},{n:'Gemini',e:'♊'},{n:'Cancer',e:'♋'},{n:'Leo',e:'♌'},{n:'Virgo',e:'♍'},{n:'Libra',e:'♎'},{n:'Scorpio',e:'♏'},{n:'Sagittarius',e:'♐'},{n:'Capricorn',e:'♑'},{n:'Aquarius',e:'♒'},{n:'Pisces',e:'♓'}];

        function startSequence() {
            if (!audioCtx) initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            go(1);
            const root = document.getElementById('zodiac-root');
            root.innerHTML = signs.map(s => `
                <button onclick="setZodiac('${s.n}')" class="bg-[#0a0a0c] border border-gray-900 p-4 hover:border-[#b39151] transition group">
                    <span class="text-2xl block mb-1 group-hover:scale-110 transition">${s.e}</span>
                    <span class="text-[9px] uppercase text-gray-500">${s.n}</span>
                </button>
            `).join('');
        }

        function setZodiac(s) { selection.zodiac = s; go(2); }

        function go(s) {
            document.querySelectorAll('#app > div').forEach(d => d.classList.add('hidden'));
            const target = document.getElementById('s' + s);
            target.classList.remove('hidden');
            target.classList.add('fade-in');
            if (s === 2) buildDeck();
        }

        function buildDeck() {
            const deck = document.getElementById('deck');
            const shuffled = [...arcanaData].sort(() => Math.random() - 0.5);
            deck.innerHTML = shuffled.map(card => `
                <div class="card-container">
                    <div class="tarot-card" onclick="flipCard(this, '${card.id}')">
                        <div class="card-inner">
                            <div class="card-face card-back"></div>
                            <div class="card-face card-front">
                                <span class="serif-cap text-3xl mb-2">${card.id}</span>
                                <span class="text-[8px] uppercase tracking-widest text-gray-500">${card.name}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function flipCard(el, id) {
            if (selection.locked) return;
            selection.locked = true;
            el.classList.add('flipped');
            selection.arcanaId = id;
            setTimeout(() => {
                const data = arcanaData.find(a => a.id === id);
                document.getElementById('res-title').innerText = data.role;
                document.getElementById('res-desc').innerText = `Your signal as an ${selection.zodiac} has unlocked the ${data.name} protocol. ${data.desc}`;
                document.getElementById('res-hear').innerText = data.hear;
                go(3);
            }, 1000);
        }

        function shareReading() {
            const text = `The Cosmic Counsel has rendered a verdict: ${document.getElementById('res-title').innerText}.`;
            if (navigator.share) navigator.share({ title: 'Cosmic Counsel', text: text, url: window.location.href });
            else alert(text);
        }

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(90, audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
        }

        function toggleAudio() {
            if (!audioCtx) initAudio();
            const ui = document.getElementById('audio-ui');
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            if (ui.innerText.includes('Hush')) {
                gainNode.gain.setTargetAtTime(0.04, audioCtx.currentTime, 1);
                ui.innerText = 'Counsel: Hum';
                ui.style.color = 'white';
            } else {
                gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5);
                ui.innerText = 'Hush: Active';
                ui.style.color = 'var(--gold)';
            }
        }
    </script>
</body>
</html>
